# Configuration Spring Boot - Budget App (JavaFX)
spring.application.name=Budget App

# Desactiver Spring Shell (utilise JavaFX)
spring.main.banner-mode=off
spring.main.web-application-type=none

# H2 Database Configuration
# - Stockage dans le dossier utilisateur (pas dans le repertoire d'installation)
# - CIPHER=AES : chiffrement du fichier de base de donnees
# - Pas de AUTO_SERVER (evite l'exposition reseau)
spring.datasource.url=jdbc:h2:file:${user.home}/.budget-app/data/budget;CIPHER=AES
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=budget_admin
# Format H2 CIPHER : "cle_fichier mot_de_passe_db" (separes par un espace)
spring.datasource.password=BudgetF1l3K3y2026 BudgetDbP@ss2026

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console desactivee en production
spring.h2.console.enabled=false

# JavaFX Weaver
javafx.weaver.resource-location=fxml

# Mise a jour automatique
app.update.enabled=true
app.update.url=https://raw.githubusercontent.com/Gautamah/BudgetApp/main/update.properties
